instance:
  name: "ai-store"
  description: "AI ecosystem research and collection store"
  version: "0.1.0"

database:
  schema: "dkb"

storage:
  snapshots_dir: "./storage/snapshots"
  cache_dir: "./storage/cache"

collection:
  default_clone_depth: 1
  license_detection: true
  max_repo_size_mb: 500
