  codex:
    label: "Codex Extensions"
    description: "Subagents, skills, and plugins for OpenAI Codex"
    trust_default: "unknown"

  agent-skills-community:
    label: "Community Agent Skills"
    description: "Community-curated agent skills and awesome lists"
